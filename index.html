<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Controle de Água</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; margin: 0; background-color: #f0f0f0;
    }
    .container {
      background: #fff; padding: 2em; border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2); width: 90%; max-width: 400px;
      text-align: center;
    }
    button {
      font-size: 1.2em; padding: 0.7em; width: 100%; margin-top: 1em;
      cursor: pointer; border: none; border-radius: 5px; background-color: #4285F4; color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <button id="loginGoogle">Entrar com Google</button>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRLrik-rHVfDNz_gn2P4oYgraM64iHI0k",
      authDomain: "parametros-de-qualidade.firebaseapp.com",
      projectId: "parametros-de-qualidade",
      storageBucket: "parametros-de-qualidade.firebasestorage.app",
      messagingSenderId: "329194124166",
      appId: "1:329194124166:web:50d3685ef680284c5fb207",
      measurementId: "G-E8WPP91D8D"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    document.getElementById("loginGoogle").addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        // Redireciona para a página de dados
        window.location.href = "app.html";
      } catch (error) {
        console.error(error);
        alert("Erro no login: " + error.message);
      }
    });
  </script>
</body>
</html>
