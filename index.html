<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piscicultura 4.0</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .tela { display: none; }
    .ativa { display: block !important; }
    .container { max-width: 450px; margin: auto; padding: 20px; font-family: sans-serif; }
    button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    input { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="container">

    <div id="telaLoading" class="tela ativa">
      <h2 style="text-align: center; margin-top: 50px;">Sincronizando...</h2>
      <p style="text-align: center; color: #666;">Aguarde o Firebase responder.</p>
    </div>

    <div id="telaLogin" class="tela">
      <h1 style="text-align: center;">Piscicultura 4.0</h1>
      <p style="text-align: center;">Acesse para registrar seus dados.</p>
      <button id="loginGoogleBtn" style="background-color: #4285F4; color: white;">Entrar com Google</button>
    </div>

    <div id="telaCadastro" class="tela">
      <h2>Quase lá!</h2>
      <p>Como devemos te chamar no sistema?</p>
      <input type="text" id="nomeCadastro" placeholder="Seu nome completo">
      <button id="btnSalvarCadastro" style="background-color: #28a745; color: white;">Finalizar Cadastro</button>
    </div>

    <div id="telaApp" class="tela">
      <div style="display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
        <div id="userIniciais" style="width: 45px; height: 45px; border-radius: 50%; background: #007bff; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem;">?</div>
        <div>
          <strong id="userNameHeader">Usuário</strong><br>
          <small id="userEmailHeader">email@exemplo.com</small>
        </div>
      </div>

      <div style="display: flex; gap: 10px; margin: 20px 0;">
        <button id="tabRegistro" style="flex: 1; margin: 0; background: #007bff; color: white;">📝 Coleta</button>
        <button id="tabPerfil" style="flex: 1; margin: 0; background: #6c757d; color: white;">👤 Perfil</button>
      </div>

      <div id="secaoRegistro">
        <form id="formMedicao">
          <label>Tanque/Caixa:</label>
          <input type="text" id="tanque" placeholder="Ex: Tanque 01" required>
          <label>Amônia (mg/L):</label>
          <input type="number" id="amonia" step="0.01" required>
          <label>pH:</label>
          <input type="number" id="ph" step="0.01" required>
          <button type="submit" id="btnSalvarMedicao" style="background: #007bff; color: white;">💾 Salvar Dados</button>
        </form>
        <button id="btnBaixarRelatorio" style="background: #28a745; color: white;">📥 Baixar Relatório CSV</button>
      </div>

      <div id="secaoPerfil" style="display: none;">
        <p><strong>Meu ID:</strong> <br><span id="userIdText" style="font-size: 11px; color: #888;"></span></p>
        <button id="btnSair" style="background: #dc3545; color: white; margin-top: 30px;">Sair do Sistema</button>
      </div>
    </div>

  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
