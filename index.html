<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Controle de Qualidade da Água</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }

    h2 {
      margin-top: 0;
    }

    h3 {
      margin-bottom: 5px;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">
  <button onclick="login()">Entrar</button>
</div>

<div class="card">
  <h2>Registro</h2>

  <label>Turno</label>
  <select id="turno">
    <option>Manhã</option>
    <option>Tarde</option>
  </select>

  <label>Tratamento</label>
  <select id="tratamento">
    <option>T1</option>
    <option>T2</option>
    <option>T3</option>
  </select>

  <label>Tanque</label>
  <select id="tanque">
    <option>Caixa 1</option>
    <option>Caixa 2</option>
    <option>Caixa 3</option>
  </select>

  <h3>🧪 Kit Colorimétrico</h3>

  <input id="amonia" placeholder="Amônia (mg/L)">
  <input id="nitrito" placeholder="Nitrito (mg/L)">
  <input id="alcalinidade" placeholder="Alcalinidade (mg/L CaCO3)">
  <input id="dureza" placeholder="Dureza (mg/L CaCO3)">

  <h3>🌊 Multiparâmetro</h3>

  <input id="ph" placeholder="pH">
  <input id="od" placeholder="Oxigênio Dissolvido (mg/L)">
  <input id="temperatura" placeholder="Temperatura (°C)">
  <input id="condutividade" placeholder="Condutividade">
  <input id="salinidade" placeholder="Salinidade">
  <input id="solidos" placeholder="Sólidos Totais">

  <button onclick="salvar()">Salvar</button>
</div>

<div class="card">
  <h2>Histórico</h2>

  <button onclick="carregar()">Carregar Registros</button>

  <ul id="lista"></ul>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
