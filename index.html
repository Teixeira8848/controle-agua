<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Controle de Água</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Controle de Qualidade da Água</h1>
  <button id="btnGoogle">Entrar com Google</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_AUTH_DOMAIN",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_STORAGE_BUCKET",
  messagingSenderId: "SEU_MSG_ID",
  appId: "SEU_APP_ID",
  measurementId: "SEU_MEAS_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

document.getElementById("btnGoogle").addEventListener("click", async () => {
  await signInWithRedirect(auth, provider);
});

// Ao carregar a página após login, verifica se usuário já registrou nome/foto
import { getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
window.onload = async () => {
  try {
    const result = await getRedirectResult(auth);
    if (!result) return; // ainda não logou
    const user = result.user;
    const userRef = doc(db, "usuarios", user.uid);
    const docSnap = await getDoc(userRef);

    if (docSnap.exists()) {
      // Usuário já registrado → vai direto pra tela de parâmetros
      window.location.href = "app.html";
    } else {
      // Usuário novo → redireciona pra tela de cadastro
      window.location.href = "cadastro.html";
    }
  } catch (e) {
    console.error(e);
    alert("Erro ao processar login.");
  }
};
</script>
</body>
</html>
