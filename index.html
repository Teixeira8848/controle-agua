<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Qualidade da Água</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .tela { display: none; }
    .ativa { display: block !important; }
    .bolinha-perfil { background-color: #007bff; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; }
    /* Estilo para os cartões do histórico */
    .card-historico { background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 10px; font-size: 0.9rem; }
    .card-header { display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-bottom: 8px; font-weight: bold; }
    .card-resumo { display: flex; gap: 5px; margin-top: 8px; background: #fff; padding: 5px; border-radius: 4px; border: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="container">

    <div id="telaLoading" class="tela ativa">
      <h2 style="text-align: center; margin-top: 50px;">Sincronizando...</h2>
    </div>

    <div id="telaLogin" class="tela">
      <h1 style="text-align: center;">Bagrinhos</h1>
      <p style="text-align: center;">Parâmetros de Qualidade da Água</p>
      <button id="loginGoogleBtn" style="width: 100%; padding: 15px; background-color: #4285F4; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px;">Entrar com Google</button>
    </div>

    <div id="telaCadastro" class="tela">
      <h2 style="text-align: center;">Criar Perfil</h2>
      <p style="text-align: center;">Como devemos te chamar?</p>
      <input type="text" id="nomeCadastro" placeholder="Seu nome completo" style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">
      <button id="btnSalvarCadastro" style="width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 16px; cursor: pointer;">Finalizar Cadastro</button>
    </div>

    <div id="telaApp" class="tela">
      
      <div id="headerPerfil" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee;">
        <div id="userIniciaisSmall" class="bolinha-perfil" style="width: 50px; height: 50px; font-size: 1.2rem; border: 2px solid #007bff;">?</div>
        <div>
          <strong id="userNameHeader" style="display: block; font-size: 1.1rem;">Carregando...</strong>
          <span id="userEmailHeader" style="font-size: 0.8rem; color: #666;">---</span>
        </div>
      </div>

      <div style="display: flex; gap: 5px; margin-bottom: 20px;">
        <button id="tabRegistro" style="flex: 1; margin: 0; padding: 10px; border: none; background-color: #007bff; color: white; font-weight: bold; cursor: pointer; border-radius: 5px;">📝 Coleta</button>
        <button id="tabHistorico" style="flex: 1; margin: 0; padding: 10px; border: none; background-color: #6c757d; color: white; font-weight: bold; cursor: pointer; border-radius: 5px;">📜 Histórico</button>
        <button id="tabPerfil" style="flex: 1; margin: 0; padding: 10px; border: none; background-color: #6c757d; color: white; font-weight: bold; cursor: pointer; border-radius: 5px;">👤 Perfil</button>
      </div>

      <div id="secaoRegistro">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h2 style="margin: 0;">Nova Medição</h2>
          <button id="btnBaixarRelatorio" style="width: auto; background-color: #28a745; color: white; padding: 5px 10px; margin: 0; border: none; border-radius: 5px; cursor: pointer;">📥 Planilha</button>
        </div>

        <form id="formMedicao">
          <label style="display: block; margin-top: 10px;">Turno:</label>
          <select id="turno" required style="width: 100%; padding: 8px; box-sizing: border-box;">
            <option value="" disabled selected>Selecione o turno</option>
            <option value="Manhã">Manhã</option>
            <option value="Tarde">Tarde</option>
          </select>

          <div class="row" style="display: flex; gap: 10px; margin-top: 10px;">
            <div style="flex: 1;">
              <label>Tratamento:</label>
              <select id="tratamento" required style="width: 100%; padding: 8px; box-sizing: border-box;">
                <option value="" disabled selected>Escolha</option>
                <option value="Tratamento 1">Tratamento 1</option>
                <option value="Tratamento 2">Tratamento 2</option>
                <option value="Tratamento 3">Tratamento 3</option>
              </select>
            </div>
            <div style="flex: 1;">
              <label>Caixa:</label>
              <select id="caixa" required style="width: 100%; padding: 8px; box-sizing: border-box;">
                <option value="" disabled selected>Escolha</option>
                <option value="Caixa 1">Caixa 1</option>
                <option value="Caixa 2">Caixa 2</option>
                <option value="Caixa 3">Caixa 3</option>
              </select>
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 5px; margin-top: 10px;">
            <label>Amônia (mg/L):</label> <input type="number" id="amonia" step="0.01" style="padding: 8px;">
            <label>Nitrito (mg/L):</label> <input type="number" id="nitrito" step="0.01" style="padding: 8px;">
            <label>Alcalinidade:</label> <input type="number" id="alcalinidade" step="0.01" style="padding: 8px;">
            <label>Dureza:</label> <input type="number" id="dureza" step="0.01" style="padding: 8px;">
            <label>pH:</label> <input type="number" id="ph" step="0.01" style="padding: 8px;">
            <label>OD (mg/L):</label> <input type="number" id="od" step="0.01" style="padding: 8px;">
            <label>Temperatura (°C):</label> <input type="number" id="temperatura" step="0.1" style="padding: 8px;">
            <label>Condutividade:</label> <input type="number" id="condutividade" step="0.01" style="padding: 8px;">
            <label>Salinidade:</label> <input type="number" id="salinidade" step="0.01" style="padding: 8px;">
            <label>Sólidos Totais:</label> <input type="number" id="solidos" step="0.01" style="padding: 8px;">
          </div>

          <button type="submit" id="btnSalvarMedicao" style="width: 100%; padding: 15px; margin-top: 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Salvar Medição</button>
        </form>
      </div>

      <div id="secaoHistorico" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h2 style="margin: 0;">Últimas Coletas</h2>
          <button id="btnAtualizarHistorico" style="width: auto; background-color: #17a2b8; color: white; padding: 5px 10px; margin: 0; border: none; border-radius: 5px; cursor: pointer;">🔄 Atualizar</button>
        </div>
        
        <div id="listaHistorico">
            <p style="text-align: center; color: #666;">Clique em Atualizar para carregar.</p>
        </div>
      </div>

      <div id="secaoPerfil" style="display: none;">
        <h2>Meu Perfil</h2>
        <div style="text-align: center; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; display: flex; flex-direction: column; align-items: center;">
          <div id="userIniciaisLarge" class="bolinha-perfil" style="width: 80px; height: 80px; font-size: 2rem; margin-bottom: 10px; border: 3px solid #007bff;">?</div>
          <p style="margin: 5px 0;"><strong>ID:</strong> <span id="userIdText" style="color: #666; font-size: 0.75rem;">---</span></p>
          <p style="margin: 5px 0;"><strong>Email:</strong> <span id="userEmailText" style="color: #666; font-size: 0.9rem;">---</span></p>
        </div>

        <label style="display: block;">Editar Nome:</label>
        <input type="text" id="editNome" placeholder="Seu nome" style="width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box;">

        <button id="btnAtualizarPerfil" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Salvar Alterações</button>
        <button id="btnSair" style="width: 100%; padding: 12px; background-color: #dc3545; color: white; margin-top: 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">Sair do Sistema</button>
      </div>

    </div>

  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
