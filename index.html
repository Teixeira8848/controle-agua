<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="style.css">
<style>
  .login-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .btn-google {
    background-color: #4285F4;
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 5px;
    font-size: 1.2rem;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  .btn-google:hover {
    background-color: #3367D6;
  }
</style>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCRLrik-rHVfDNz_gn2P4oYgraM64iHI0k",
  authDomain: "parametros-de-qualidade.firebaseapp.com",
  projectId: "parametros-de-qualidade",
  storageBucket: "parametros-de-qualidade.firebasestorage.app",
  messagingSenderId: "329194124166",
  appId: "1:329194124166:web:50d3685ef680284c5fb207",
  measurementId: "G-E8WPP91D8D"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.loginGoogle = async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const user = result.user;

      // Salva localmente para verificar cadastro
      localStorage.setItem("userEmail", user.email);

      // Verifica se já tem nome cadastrado
      const nome = localStorage.getItem("userNome");
      if (!nome) {
        window.location.href = "cadastro.html";
      } else {
        window.location.href = "app.html";
      }
    } catch (error) {
      console.error("Erro no login:", error);
      alert("Erro no login: " + error.code);
    }
  };
</script>
</head>
<body>
  <div class="login-container">
    <h1>Login</h1>
    <button class="btn-google" id="btnGoogle">Entrar com Google</button>
  </div>

  <script>
    // Adiciona evento de clique de forma segura
    document.getElementById("btnGoogle").addEventListener("click", () => {
      loginGoogle();
    });
  </script>
</body>
</html>
