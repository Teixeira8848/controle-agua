<div class="form-section">
        <h3>Local da Medição</h3>
        <span class="badge-info">Selecione o turno, o tratamento e a caixa correspondente.</span>
        
        <label for="turno">Turno:*</label>
        <select id="turno" class="select-field" required>
          <option value="" disabled selected>Escolha o turno...</option>
          <option value="Manhã">Manhã</option>
          <option value="Tarde">Tarde</option>
          <option value="Noite">Noite</option>
        </select>

        <div class="grid-selects">
          <div>
            <label for="tratamento">Tratamento:*</label>
            <select id="tratamento" class="select-field" required>
              <option value="" disabled selected>Selecionar...</option>
              <option value="Tratamento 1">Tratamento 1</option>
              <option value="Tratamento 2">Tratamento 2</option>
              <option value="Tratamento 3">Tratamento 3</option>
            </select>
          </div>
          <div>
            <label for="caixa">Caixa/Repetição:*</label>
            <select id="caixa" class="select-field" required>
              <option value="" disabled selected>Selecionar...</option>
              <option value="Caixa 1">Caixa 1</option>
              <option value="Caixa 2">Caixa 2</option>
              <option value="Caixa 3">Caixa 3</option>
            </select>
          </div>
        </div>
      </div>
