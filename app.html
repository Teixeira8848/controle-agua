<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piscicultura 4.0</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .tela { display: none; }
    .ativa { display: block; }
    .container { max-width: 400px; margin: auto; padding: 20px; }
    button { width: 100%; padding: 12px; margin: 10px 0; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; }
    input, select { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
  </style>
</head>
<body>
  <div class="container">

    <div id="telaLoading" class="tela ativa">
      <h2 style="text-align: center;">Carregando...</h2>
    </div>

    <div id="telaLogin" class="tela">
      <h1 style="text-align: center;">Piscicultura 4.0</h1>
      <button id="loginGoogleBtn" style="background-color: #4285F4; color: white;">Entrar com Google</button>
      <p id="msgDebug" style="font-size: 10px; color: #999; text-align: center;"></p>
    </div>

    <div id="telaCadastro" class="tela">
      <h2>Criar Perfil</h2>
      <label>Seu nome:</label>
      <input type="text" id="nomeCadastro" placeholder="Ex: João Silva">
      <button id="btnSalvarCadastro" style="background-color: #28a745; color: white;">Finalizar Cadastro</button>
    </div>

    <div id="telaApp" class="tela">
      <div style="display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px;">
        <div id="userIniciais" style="width: 40px; height: 40px; border-radius: 50%; background: #007bff; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold;">?</div>
        <div>
          <strong id="userNameHeader">Usuário</strong><br>
          <small id="userEmailHeader">email@teste.com</small>
        </div>
      </div>

      <div style="display: flex; gap: 5px; margin-bottom: 15px;">
        <button id="tabRegistro" style="flex: 1; margin: 0; background: #007bff; color: white;">Coleta</button>
        <button id="tabPerfil" style="flex: 1; margin: 0; background: #6c757d; color: white;">Perfil</button>
      </div>

      <div id="secaoRegistro">
        <form id="formMedicao">
          <label>Tanque/Caixa:</label>
          <input type="text" id="tanque" placeholder="Ex: T1-C1" required>
          <label>Amônia (mg/L):</label>
          <input type="number" id="amonia" step="0.01" required>
          <label>pH:</label>
          <input type="number" id="ph" step="0.01" required>
          <button type="submit" id="btnSalvarMedicao" style="background: #007bff; color: white;">Salvar Medição</button>
        </form>
        <button id="btnBaixarRelatorio" style="background: #28a745; color: white;">Baixar CSV</button>
      </div>

      <div id="secaoPerfil" style="display: none;">
        <p><strong>Seu ID:</strong> <span id="userIdText" style="font-size: 10px;"></span></p>
        <button id="btnSair" style="background: #dc3545; color: white;">Sair do Sistema</button>
      </div>
    </div>

  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
