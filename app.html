<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Qualidade da Água</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    
    <div id="headerPerfil" style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee;">
      <img id="userFotoSmall" src="https://via.placeholder.com/50" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #007bff;">
      <div>
        <strong id="userNameHeader" style="display: block; font-size: 1.1rem;">Carregando...</strong>
        <span id="userEmailHeader" style="font-size: 0.8rem; color: #666;">---</span>
      </div>
    </div>

    <div style="display: flex; gap: 5px; margin-bottom: 20px;">
      <button id="tabRegistro" style="flex: 1; margin: 0; background-color: #007bff; color: white;">📝 Registro</button>
      <button id="tabPerfil" style="flex: 1; margin: 0; background-color: #6c757d; color: white;">👤 Perfil</button>
    </div>

    <div id="secaoRegistro">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0;">Medições</h2>
        <button id="btnBaixarRelatorio" style="width: auto; background-color: #28a745; padding: 5px 10px; margin: 0;">Relatório</button>
      </div>

      <form id="formMedicao">
        <label>Turno:</label>
        <select id="turno" required>
          <option value="" disabled selected>Selecione o turno</option>
          <option value="Manhã">Manhã</option>
          <option value="Tarde">Tarde</option>
        </select>

        <div class="row" style="display: flex; gap: 10px;">
          <div style="flex: 1;">
            <label>Tratamento:</label>
            <select id="tratamento" required>
              <option value="" disabled selected>Escolha</option>
              <option value="Tratamento 1">Tratamento 1</option>
              <option value="Tratamento 2">Tratamento 2</option>
              <option value="Tratamento 3">Tratamento 3</option>
            </select>
          </div>
          <div style="flex: 1;">
            <label>Caixa:</label>
            <select id="caixa" required>
              <option value="" disabled selected>Escolha</option>
              <option value="Caixa 1">Caixa 1</option>
              <option value="Caixa 2">Caixa 2</option>
              <option value="Caixa 3">Caixa 3</option>
            </select>
          </div>
        </div>

        <label>Amônia (mg/L):</label>
        <input type="number" id="amonia" step="0.01" required>
        <label>Nitrito (mg/L):</label>
        <input type="number" id="nitrito" step="0.01" required>
        <label>Alcalinidade:</label>
        <input type="number" id="alcalinidade" step="0.01" required>
        <label>Dureza:</label>
        <input type="number" id="dureza" step="0.01" required>
        <label>pH:</label>
        <input type="number" id="ph" step="0.01" required>
        <label>OD (mg/L):</label>
        <input type="number" id="od" step="0.01" required>
        <label>Temperatura (°C):</label>
        <input type="number" id="temperatura" step="0.1" required>
        <label>Condutividade (Opcional):</label>
        <input type="number" id="condutividade" step="0.01">
        <label>Salinidade (Opcional):</label>
        <input type="number" id="salinidade" step="0.01">
        <label>Sólidos Totais (Opcional):</label>
        <input type="number" id="solidos" step="0.01">

        <button type="submit" id="btnSalvarMedicao">Salvar Medição</button>
      </form>
    </div>

    <div id="secaoPerfil" style="display: none;">
      <h2>Meu Perfil</h2>
      <div style="text-align: center; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px;">
        <img id="userFotoLarge" src="https://via.placeholder.com/100" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 10px; border: 3px solid #007bff;">
        <p style="margin: 5px 0;"><strong>ID:</strong> <span id="userIdText" style="color: #666; font-size: 0.75rem;">---</span></p>
        <p style="margin: 5px 0;"><strong>Email:</strong> <span id="userEmailText" style="color: #666; font-size: 0.9rem;">---</span></p>
      </div>

      <label>Editar Nome:</label>
      <input type="text" id="editNome" placeholder="Seu nome">
      
      <label>Atualizar Foto:</label>
      <input type="file" id="editFoto" accept="image/*">

      <button id="btnAtualizarPerfil" style="background-color: #007bff; color: white;">Salvar Alterações</button>
      <button id="btnSair" style="background-color: #dc3545; color: white; margin-top: 30px;">Sair do Sistema</button>
    </div>

  </div>
  <script type="module" src="app.js"></script>
</body>
</html>
