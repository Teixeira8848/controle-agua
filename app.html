<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro de Dados - Controle de Água</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 1em; background: #f0f0f0;
    }
    h2 { text-align: center; }
    input, select, button {
      font-size: 1.1em; padding: 0.5em; margin: 0.3em 0; width: 100%;
    }
    button { cursor: pointer; background: #4285F4; color: white; border: none; border-radius: 5px; }
    li { margin-bottom: 1em; background: #fff; padding: 0.5em; border-radius: 5px; list-style: none; }
  </style>
</head>
<body>
  <h2>Registro de Qualidade da Água</h2>

  <div>
    <label for="turno">Turno</label>
    <select id="turno">
      <option value="Manhã">Manhã</option>
      <option value="Tarde">Tarde</option>
    </select>

    <label for="tanque">Tratamento / Tanque</label>
    <select id="tanque">
      <option value="Trat1 - Caixa1">Trat1 - Caixa1</option>
      <option value="Trat1 - Caixa2">Trat1 - Caixa2</option>
      <option value="Trat1 - Caixa3">Trat1 - Caixa3</option>
      <option value="Trat2 - Caixa1">Trat2 - Caixa1</option>
      <option value="Trat2 - Caixa2">Trat2 - Caixa2</option>
      <option value="Trat2 - Caixa3">Trat2 - Caixa3</option>
      <option value="Trat3 - Caixa1">Trat3 - Caixa1</option>
      <option value="Trat3 - Caixa2">Trat3 - Caixa2</option>
      <option value="Trat3 - Caixa3">Trat3 - Caixa3</option>
    </select>

    <h3>Multiparâmetro</h3>
    <input id="ph" type="number" placeholder="pH">
    <input id="od" type="number" placeholder="Oxigênio Dissolvido (mg/L)">
    <input id="temperatura" type="number" placeholder="Temperatura (°C)">
    <input id="condutividade" type="number" placeholder="Condutividade">
    <input id="salinidade" type="number" placeholder="Salinidade">
    <input id="solidos" type="number" placeholder="Sólidos Totais">

    <h3>Colorimétrico</h3>
    <input id="amonia" type="number" placeholder="Amônia (mg/L)">
    <input id="nitrito" type="number" placeholder="Nitrito (mg/L)">
    <input id="alcalinidade" type="number" placeholder="Alcalinidade (mg/L)">
    <input id="dureza" type="number" placeholder="Dureza (mg/L)">

    <input id="obs" type="text" placeholder="Observações">

    <button id="salvar">Salvar Registro</button>
    <button id="carregar">Carregar Registros</button>

    <ul id="lista"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, addDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCRLrik-rHVfDNz_gn2P4oYgraM64iHI0k",
      authDomain: "parametros-de-qualidade.firebaseapp.com",
      projectId: "parametros-de-qualidade",
      storageBucket: "parametros-de-qualidade.firebasestorage.app",
      messagingSenderId: "329194124166",
      appId: "1:329194124166:web:50d3685ef680284c5fb207",
      measurementId: "G-E8WPP91D8D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userAtual = null;

    // Redireciona para login se não estiver logado
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        userAtual = user;
      }
    });

    document.getElementById("salvar").addEventListener("click", async () => {
      await addDoc(collection(db, "registros"), {
        usuario: userAtual.email,
        dataHora: new Date(),
        turno: document.getElementById("turno").value,
        tanque: document.getElementById("tanque").value,
        ph: document.getElementById("ph").value,
        od: document.getElementById("od").value,
        temperatura: document.getElementById("temperatura").value,
        condutividade: document.getElementById("condutividade").value,
        salinidade: document.getElementById("salinidade").value,
        solidos: document.getElementById("solidos").value,
        amonia: document.getElementById("amonia").value,
        nitrito: document.getElementById("nitrito").value,
        alcalinidade: document.getElementById("alcalinidade").value,
        dureza: document.getElementById("dureza").value,
        obs: document.getElementById("obs").value
      });
      alert("Registro salvo!");
    });

    document.getElementById("carregar").addEventListener("click", async () => {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";
      const querySnapshot = await getDocs(collection(db, "registros"));
      querySnapshot.forEach((doc) => {
        const dados = doc.data();
        const item = document.createElement("li");
        item.innerHTML = `
          <strong>${dados.usuario}</strong><br>
          Turno: ${dados.turno} | Tanque: ${dados.tanque}<br>
          pH: ${dados.ph} | OD: ${dados.od} | Temp: ${dados.temperatura}°C<br>
          Amônia: ${dados.amonia} mg/L | Nitrito: ${dados.nitrito} mg/L<br>
          Alcalinidade: ${dados.alcalinidade} mg/L | Dureza: ${dados.dureza} mg/L<br>
          Condutividade: ${dados.condutividade} | Salinidade: ${dados.salinidade} | Solidos: ${dados.solidos}<br>
          Obs: ${dados.obs}<br>
          Data: ${new Date(dados.dataHora).toLocaleString()}
        `;
        lista.appendChild(item);
      });
    });
  </script>
</body>
</html>
